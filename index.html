<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dentists for Africa - Signatur Generator</title>
    <!-- Tailwind CSS für das Design -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM via CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel für JSX Support im Browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const InputField = ({ label, name, value, onChange, type = "text" }) => (
            <div className="mb-3">
                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">{label}</label>
                <input
                    type={type}
                    value={value}
                    onChange={(e) => onChange(name, e.target.value)}
                    className="w-full px-3 py-2 bg-slate-50 border border-slate-200 rounded-md focus:ring-2 focus:ring-red-800 focus:bg-white outline-none transition-all text-sm"
                />
            </div>
        );

        const App = () => {
            const githubBase = "https://raw.githubusercontent.com/lutzkohl/dentists-for-africa/main";
            const brandColor = '#8b2323';

            const [data, setData] = useState({
                name: 'Anne-Kristin Henker',
                position: 'Projektmanagerin',
                mobile: '+49 (0) 176 31 29 30 57',
                email: 'a.henker@dentists-for-africa.org',
                
                // GitHub Assets
                logoUrl: `${githubBase}/logo.jpg`, 
                worldIcon: `${githubBase}/world.png`,
                instaIcon: `${githubBase}/insta.png`,
                fbIcon: `${githubBase}/facebook.png`,
                ytIcon: `${githubBase}/youtube.png`,
                liIcon: `${githubBase}/linked.png`,
                
                address: 'Dentists for Africa e.V. | Belvederer Allee 25 | 99425 Weimar',
                officePhone: '+49 (0)3634 6048592',
                officeEmail: 'info@dentists-for-africa.org',
                
                // Offizielle Links (Aktualisiert)
                webLink: 'https://dentists-for-africa.org/',
                instaLink: 'https://www.instagram.com/dentistsforafrica/',
                fbLink: 'https://www.facebook.com/dentists.africa',
                ytLink: 'https://www.youtube.com/channel/UCqy-zN_jYO-hNj9dgaRHW7Q',
                liLink: 'https://www.linkedin.com/company/dentists-for-africa',
                
                newsletterLink: 'https://www.dentists-for-africa.org/newsletter',
                reportLink: 'https://www.dentists-for-africa.org/jahresbericht',
                ctaText: 'Nehmen Sie an der diesjährigen Weihnachtstombola teil und schenken Sie Witwen und Waisen in Kenia dringend benötigte Hilfsgüter!',
                ctaLink: 'https://www.dentists-for-africa.org/tombola',
                
                iban: 'DE86 8205 1000 0140 0467 98',
                bic: 'HELADEF1WEM',
                bank: 'Sparkasse Mittelthüringen'
            });

            const [copied, setCopied] = useState(false);
            const [viewMode, setViewMode] = useState('preview');
            const signatureRef = useRef(null);

            const handleInputChange = (name, value) => {
                setData(prev => ({ ...prev, [name]: value }));
            };

            const handleCopy = () => {
                const range = document.createRange();
                range.selectNode(signatureRef.current);
                window.getSelection().removeAllRanges();
                window.getSelection().addRange(range);
                document.execCommand('copy');
                setCopied(true);
                setTimeout(() => setCopied(false), 3000);
                window.getSelection().removeAllRanges();
            };

            return (
                <div className="min-h-screen py-8 px-4">
                    <div className="max-w-6xl mx-auto">
                        <header className="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <div>
                                <h1 className="text-2xl font-black text-red-900 uppercase tracking-tighter">Dentists for Africa</h1>
                                <p className="text-slate-500 text-sm font-medium">Offizieller E-Mail Signatur Generator</p>
                            </div>
                            <div className="flex bg-slate-100 p-1 rounded-xl shadow-inner">
                                <button onClick={() => setViewMode('preview')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${viewMode === 'preview' ? 'bg-white text-red-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>Vorschau</button>
                                <button onClick={() => setViewMode('code')} className={`px-6 py-2 rounded-lg text-sm font-bold transition-all ${viewMode === 'code' ? 'bg-white text-red-900 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>HTML Code</button>
                            </div>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            {/* Editor Panel */}
                            <div className="lg:col-span-4 space-y-4">
                                <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="text-xs font-bold mb-4 text-red-800 uppercase tracking-widest border-b pb-2">Mitarbeiter Daten</h2>
                                    <InputField label="Name" name="name" value={data.name} onChange={handleInputChange} />
                                    <InputField label="Position" name="position" value={data.position} onChange={handleInputChange} />
                                    <InputField label="Mobil" name="mobile" value={data.mobile} onChange={handleInputChange} />
                                    <InputField label="E-Mail" name="email" value={data.email} onChange={handleInputChange} type="email" />
                                </section>
                                <div className="p-4 bg-red-50 rounded-2xl border border-red-100 text-[10px] text-red-800 leading-tight">
                                    <p className="font-bold mb-1 uppercase tracking-tighter">Anleitung:</p>
                                    Daten eingeben, "Kopieren" klicken und in die Mail-Einstellungen einfügen. Haken bei "Schriftart beibehalten" unbedingt entfernen.
                                </div>
                            </div>

                            {/* Preview Panel */}
                            <div className="lg:col-span-8">
                                <div className="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
                                    <div className="flex justify-between items-center mb-6">
                                        <h2 className="text-lg font-bold text-slate-800">Vorschau</h2>
                                        <button onClick={handleCopy} className={`flex items-center gap-2 px-8 py-3 rounded-xl font-bold transition-all shadow-lg active:scale-95 ${copied ? 'bg-green-600 text-white' : 'bg-red-800 text-white hover:bg-red-900'}`}>
                                            {copied ? 'Kopiert!' : 'Signatur kopieren'}
                                        </button>
                                    </div>

                                    <div className="bg-white border border-slate-100 rounded-xl p-6 overflow-x-auto min-h-[400px] flex items-center justify-center">
                                        {viewMode === 'preview' ? (
                                            <div ref={signatureRef} style={{ background: '#ffffff', display: 'inline-block' }}>
                                                {/* --- HTML SIGNATURE START --- */}
                                                <table cellPadding="0" cellSpacing="0" border="0" style={{ fontFamily: 'Arial, sans-serif', color: '#000000', lineHeight: '1.4', width: '500px', borderCollapse: 'collapse' }}>
                                                    <tr>
                                                        <td style={{ paddingBottom: '15px' }}>
                                                            <div style={{ fontSize: '18px', fontWeight: 'bold', margin: '0' }}>{data.name}</div>
                                                            <div style={{ fontSize: '14px', margin: '0' }}>{data.position}</div>
                                                            <div style={{ padding: '8px 0' }}>&nbsp;</div>
                                                            <div style={{ fontSize: '14px' }}>{data.mobile}</div>
                                                            <div style={{ fontSize: '14px' }}>
                                                                <a href={`mailto:${data.email}`} style={{ color: brandColor, textDecoration: 'underline' }}>{data.email}</a>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td style={{ borderTop: '1px solid #333333', paddingTop: '20px', paddingBottom: '20px' }}>
                                                            <img src={data.logoUrl} alt="Logo" width="280" style={{ display: 'block', width: '280px', height: 'auto', marginBottom: '15px' }} />
                                                            <div style={{ fontSize: '13px', marginBottom: '8px' }}>{data.address}</div>
                                                            <div style={{ fontSize: '13px' }}>Phone: &nbsp; {data.officePhone}</div>
                                                            <div style={{ fontSize: '13px', marginBottom: '15px' }}>E-Mail: <a href={`mailto:${data.officeEmail}`} style={{ color: brandColor, textDecoration: 'none' }}>{data.officeEmail}</a></div>
                                                            <div>
                                                                <a href={data.webLink} style={{ textDecoration: 'none', marginRight: '6px' }}><img src={data.worldIcon} width="24" height="24" style={{ display: 'inline-block', border: '0' }} /></a>
                                                                <a href={data.instaLink} style={{ textDecoration: 'none', marginRight: '6px' }}><img src={data.instaIcon} width="24" height="24" style={{ display: 'inline-block', border: '0' }} /></a>
                                                                <a href={data.fbLink} style={{ textDecoration: 'none', marginRight: '6px' }}><img src={data.fbIcon} width="24" height="24" style={{ display: 'inline-block', border: '0' }} /></a>
                                                                <a href={data.ytLink} style={{ textDecoration: 'none', marginRight: '6px' }}><img src={data.ytIcon} width="24" height="24" style={{ display: 'inline-block', border: '0' }} /></a>
                                                                <a href={data.liLink} style={{ textDecoration: 'none' }}><img src={data.liIcon} width="24" height="24" style={{ display: 'inline-block', border: '0' }} /></a>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td style={{ paddingTop: '10px', fontSize: '13px' }}>
                                                            <div style={{ marginBottom: '4px' }}><a href={data.newsletterLink} style={{ color: '#0056b3', textDecoration: 'underline' }}>Zum Newsletter anmelden</a></div>
                                                            <div style={{ marginBottom: '15px' }}><a href={data.reportLink} style={{ color: '#0056b3', textDecoration: 'underline' }}>Zum Jahresbericht 2024</a></div>
                                                            <div style={{ marginBottom: '15px' }}>{data.ctaText}</div>
                                                            <div style={{ marginBottom: '20px' }}>
                                                                <a href={data.ctaLink} style={{ display: 'inline-block', padding: '10px 30px', backgroundColor: brandColor, color: '#ffffff', borderRadius: '6px', textDecoration: 'none', fontWeight: 'bold', fontSize: '16px' }}>
                                                                    Spenden
                                                                </a>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                    <tr>
                                                        <td style={{ fontSize: '11px', color: '#333333', lineHeight: '1.4' }}>
                                                            Spendenkonto: IBAN {data.iban}<br />
                                                            BIC: {data.bic} &nbsp;&nbsp;&nbsp;&nbsp;&nbsp; {data.bank}
                                                        </td>
                                                    </tr>
                                                </table>
                                                {/* --- HTML SIGNATURE END --- */}
                                            </div>
                                        ) : (
                                            <textarea readOnly value={signatureRef.current?.innerHTML || ''} className="w-full h-96 p-4 bg-slate-900 text-red-200 font-mono text-xs rounded-xl border-none outline-none resize-none shadow-inner" />
                                        )}
                                    </div>
                                    <div className="mt-6 flex items-start gap-3 p-4 bg-blue-50 rounded-xl border border-blue-100 text-[11px] text-blue-800 shadow-sm">
                                        <div className="font-bold uppercase tracking-tighter bg-blue-200 px-1 rounded h-fit">Technik:</div>
                                        <div>Icons & Logo werden von GitHub geladen. Die Links wurden auf den neuesten Stand gebracht.</div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
